name: Keepalive

# Empêche GitHub de désactiver les workflows planifiés pour inactivité
# (« disabled_inactivity » après 60 jours sans activité sur le repo).
# Tourne chaque semaine : bien à l'intérieur de la fenêtre de 60 jours.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # tous les lundis à 06:17 UTC

permissions:
  contents: write
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Empty commit to reset inactivity timer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push

      - name: Re-enable the PMU import workflow if disabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable import_pmu.yml || true
